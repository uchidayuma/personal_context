services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    ports:
      - "3001:3001"
    volumes:
      - ./packages:/app/packages
      - ./data:/app/data
      - ./models:/app/models
      # node_modules はコンテナ内のものを使う（ホストと共有しない）
      - /app/node_modules
      - /app/packages/server/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DB_PATH=/app/data/personal_context.db
      - SIMULATE_DB_PATH=/app/data/simulate.db
      # Set WATCH=true to enable hot-reload (may cause instability on macOS due to polling)
      # - WATCH=true
      # - CHOKIDAR_USEPOLLING=true

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "5173:5173"
    volumes:
      - ./packages/web:/app/packages/web
      - /app/packages/web/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
