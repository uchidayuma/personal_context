services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: server
    ports:
      - "3001:3001"
    volumes:
      - ./packages:/app/packages
      - ./data:/app/data
      - ./models:/app/models
      # node_modules はコンテナ内のものを使う（ホストと共有しない）
      - /app/node_modules
      - /app/packages/server/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: web
    ports:
      - "5173:5173"
    volumes:
      - ./packages/web:/app/packages/web
      - /app/packages/web/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
