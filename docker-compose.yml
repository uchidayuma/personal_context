services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=personal_context
      - POSTGRES_PASSWORD=personal_context
      - POSTGRES_DB=personal_context
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U personal_context"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=200

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./packages:/app/packages
      - ./data:/app/data
      - ./models:/app/models
      - ./gcp-tts-key.json:/app/gcp-tts-key.json:ro
      # node_modules はコンテナ内のものを使う（ホストと共有しない）
      - /app/node_modules
      - /app/packages/server/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_TYPE=postgres
      - DATABASE_URL=postgresql://personal_context:personal_context@postgres:5432/personal_context
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-tts-key.json
      # Set WATCH=true to enable hot-reload (may cause instability on macOS due to polling)
      # - WATCH=true
      # - CHOKIDAR_USEPOLLING=true
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "5173:5173"
    volumes:
      - ./packages/web:/app/packages/web
      - /app/packages/web/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development

volumes:
  postgres_data:
