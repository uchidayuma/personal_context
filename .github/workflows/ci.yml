name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: personal_context
          POSTGRES_PASSWORD: personal_context
          POSTGRES_DB: personal_context_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      TEST_DATABASE_URL: postgresql://personal_context:personal_context@localhost:5432/personal_context_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (server)
        run: pnpm --filter @personal-context/server exec tsc --noEmit

      - name: Type check (web)
        run: pnpm --filter web exec tsc --noEmit

      - name: Test (server)
        run: pnpm --filter @personal-context/server test

      - name: Build (server)
        run: pnpm --filter @personal-context/server build

      - name: Build (web)
        run: pnpm --filter web build
