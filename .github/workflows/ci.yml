name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (server)
        run: pnpm --filter @personal-context/server exec tsc --noEmit

      - name: Type check (web)
        run: pnpm --filter web exec tsc --noEmit

      - name: Test (server)
        run: pnpm --filter @personal-context/server test

      - name: Build (server)
        run: pnpm --filter @personal-context/server build

      - name: Build (web)
        run: pnpm --filter web build
